<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineBASE – 3D Movie Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js">
    </script>
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #07080b;
            color: #eef1f5;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }
        #root {
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        /* ── Top bar ── */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 30;
            background: #000000;
            padding: 12px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
            box-shadow: 0 2px 12px rgba(0,0,0,0.8);
            font-family: 'Press Start 2P', cursive;
            color: #ffffff;
            text-align: center;
            pointer-events: none;
        }
        #top-bar .line {
            width: 80%;
            max-width: 400px;
            height: 2px;
            background: #444;
            margin: 4px 0;
        }
        #top-bar .title {
            font-size: 22px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(99,102,241,0.3);
            padding: 4px 0;
        }
        @media (max-width: 600px) {
            #top-bar .title { font-size: 16px; }
            #top-bar .line { width: 60%; }
        }

        /* ── Three.js canvas ── */
        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        #three-container:active { cursor: grabbing; }

        /* ── search bar ── */
        #search-overlay {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 72%;
            max-width: 860px;
            background: rgba(12, 15, 22, 0.88);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 60px;
            padding: 6px 8px 6px 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: box-shadow 0.3s;
        }
        #search-overlay:focus-within {
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.9), 0 0 0 2px rgba(99, 102, 241, 0.15);
        }
        #search-overlay input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #eef1f5;
            font-size: 15px;
            padding: 13px 0;
            min-width: 0;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        #search-overlay input::placeholder {
            color: #5a6a7f;
            font-weight: 300;
        }
        #search-overlay .divider {
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }
        .search-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 40px;
            padding: 10px 26px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
        }
        .search-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 36px rgba(99, 102, 241, 0.4);
        }
        .search-btn:active { transform: scale(0.96); }

        /* ── results dropdown ── */
        #search-results {
            position: absolute;
            bottom: calc(100% + 14px);
            left: 0;
            right: 0;
            background: rgba(12, 15, 22, 0.96);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 0;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 24px 100px rgba(0, 0, 0, 0.7);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.06) transparent;
        }
        #search-results::-webkit-scrollbar { width: 4px; }
        #search-results::-webkit-scrollbar-track { background: transparent; }
        #search-results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
        #search-results.open { display: block; }

        .result-item {
            padding: 11px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.12s;
            border-left: 3px solid transparent;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-left-color: #6366f1;
        }
        .result-item .poster-sm {
            width: 38px;
            height: 52px;
            border-radius: 6px;
            background: #171b24;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .result-item .poster-sm img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .result-item .info {
            flex: 1;
            min-width: 0;
        }
        .result-item .info .title {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-item .info .sub {
            font-size: 12px;
            color: #6b7a8f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-item .badge-genre {
            font-size: 10px;
            padding: 3px 12px;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.12);
            color: #a5b4fc;
            font-weight: 500;
            flex-shrink: 0;
            letter-spacing: 0.2px;
        }
        .result-empty {
            padding: 28px 24px;
            text-align: center;
            color: #6b7a8f;
            font-size: 14px;
        }

        /* ── page overlay ── */
        #page-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(7, 8, 11, 0.94);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            overflow-y: auto;
            padding: 32px 48px 60px;
            display: none;
            opacity: 0;
            transition: opacity 0.35s ease, transform 0.35s ease;
            transform: scale(0.97);
            pointer-events: none;
            scroll-behavior: smooth;
        }
        #page-overlay.open {
            display: block;
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }
        #page-overlay::-webkit-scrollbar { width: 5px; }
        #page-overlay::-webkit-scrollbar-track { background: transparent; }
        #page-overlay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 10px; }

        .close-btn {
            position: sticky;
            top: 0;
            float: right;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #eef1f5;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 5;
            margin-bottom: 16px;
        }
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.10);
            transform: rotate(90deg) scale(1.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        #page-content {
            max-width: 1040px;
            margin: 0 auto;
        }

        /* ── genre header ── */
        .genre-header {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -0.8px;
            line-height: 1.1;
        }
        .genre-header span {
            background: linear-gradient(135deg, #6366f1, #a78bfa, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .genre-sub {
            color: #6b7a8f;
            font-size: 15px;
            margin-bottom: 28px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ── movie grid ── */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 16px;
            margin-top: 18px;
        }
        .movie-card {
            background: rgba(255, 255, 255, 0.025);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .movie-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.02), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .movie-card:hover::before { opacity: 1; }
        .movie-card:hover {
            background: rgba(255, 255, 255, 0.045);
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.15);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
        }
        .movie-card .m-title {
            font-weight: 600;
            font-size: 17px;
            letter-spacing: -0.2px;
            position: relative;
            z-index: 1;
        }
        .movie-card .m-meta {
            font-size: 13px;
            color: #8a9aaf;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            position: relative;
            z-index: 1;
        }
        .movie-card .m-rating {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
            font-size: 13px;
            position: relative;
            z-index: 1;
        }
        .movie-card .m-rating .stars { color: #fbbf24; letter-spacing: 1px; }
        .movie-card .m-rating .views { color: #5a6a7f; }
        .movie-card .m-year { color: #5a6a7f; font-weight: 400; font-size: 14px; }

        /* ── movie detail page ── */
        .movie-page .poster-section {
            display: flex;
            gap: 36px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .movie-page .poster-section .poster {
            width: 210px;
            height: 290px;
            border-radius: 16px;
            background: #141820;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: transform 0.3s;
        }
        .movie-page .poster-section .poster:hover { transform: scale(1.01); }
        .movie-page .poster-section .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .movie-page .poster-section .info {
            flex: 1;
            min-width: 200px;
        }
        .movie-page .poster-section .info .title {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.8px;
            line-height: 1.1;
        }
        .movie-page .poster-section .info .title .year {
            font-weight: 400;
            color: #5a6a7f;
            font-size: 28px;
            margin-left: 6px;
        }
        .movie-page .poster-section .info .director {
            font-size: 16px;
            color: #8a9aaf;
            margin-top: 4px;
        }
        .movie-page .poster-section .info .director strong {
            color: #eef1f5;
            cursor: pointer;
            transition: color 0.2s;
            font-weight: 600;
        }
        .movie-page .poster-section .info .director strong:hover { color: #a5b4fc; }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            margin-top: 12px;
        }
        .tags .tag {
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #c8d0dc;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .tags .tag.genre-tag {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.10);
            color: #a5b4fc;
        }
        .actors {
            font-size: 14px;
            color: #8a9aaf;
            margin-top: 10px;
        }
        .actors strong { color: #eef1f5; font-weight: 500; }
        .awards {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 10px;
            margin-top: 10px;
        }
        .awards .badge {
            font-size: 11px;
            padding: 4px 14px;
            border-radius: 30px;
            background: rgba(251, 191, 36, 0.06);
            border: 1px solid rgba(251, 191, 36, 0.08);
            color: #fbbf24;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .wiki-link {
            display: inline-block;
            margin-top: 14px;
            color: #818cf8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
            border-bottom: 1px solid transparent;
        }
        .wiki-link:hover {
            color: #a5b4fc;
            border-bottom-color: rgba(99, 102, 241, 0.2);
        }

        .perspectives {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-top: 8px;
        }
        .perspective-block {
            background: rgba(255, 255, 255, 0.015);
            border-radius: 20px;
            padding: 24px 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: border-color 0.3s;
        }
        .perspective-block:hover {
            border-color: rgba(255, 255, 255, 0.06);
        }
        .perspective-block .p-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }
        .perspective-block .p-title .emoji { font-size: 22px; }

        .rating-bars {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 44px;
        }
        .rating-bars .rb-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 110px;
        }
        .rating-bars .rb-item .rb-label {
            font-size: 13px;
            color: #8a9aaf;
            font-weight: 500;
        }
        .rating-bars .rb-item .rb-bar {
            width: 120px;
            height: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .rating-bars .rb-item .rb-bar .fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.8s ease;
        }
        .rating-bars .rb-item .rb-val {
            font-size: 14px;
            font-weight: 600;
        }

        .wordcloud {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px;
            margin-top: 14px;
        }
        .wordcloud .word {
            padding: 4px 14px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            font-size: 13px;
            font-weight: 500;
            color: #c8d0dc;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }
        .wordcloud .word:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.02);
        }
        .wordcloud .word.large { font-size: 19px; padding: 6px 20px; }
        .wordcloud .word.med { font-size: 15px; padding: 5px 16px; }

        .aesthetic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px 28px;
            margin-top: 4px;
        }
        .aesthetic-grid .ae-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .aesthetic-grid .ae-item .ae-label {
            font-size: 13px;
            color: #8a9aaf;
            font-weight: 500;
            text-transform: capitalize;
        }
        .aesthetic-grid .ae-item .ae-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            overflow: hidden;
        }
        .aesthetic-grid .ae-item .ae-bar .fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            transition: width 0.8s ease;
        }
        .aesthetic-grid .ae-item .ae-val {
            font-size: 13px;
            font-weight: 600;
        }

        .financial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
        }
        .financial-grid .fi-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: border-color 0.2s;
        }
        .financial-grid .fi-item:hover {
            border-color: rgba(255, 255, 255, 0.07);
        }
        .financial-grid .fi-item .fi-label {
            font-size: 13px;
            color: #5a6a7f;
            font-weight: 500;
        }
        .financial-grid .fi-item .fi-val {
            font-size: 20px;
            font-weight: 700;
            margin-top: 2px;
            letter-spacing: -0.3px;
        }

        .director-page .dir-header {
            display: flex;
            align-items: center;
            gap: 28px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .director-page .dir-header .avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
        }
        .director-page .dir-header .info .name {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.8px;
        }
        .director-page .dir-header .info .avg {
            font-size: 16px;
            color: #8a9aaf;
        }
        .director-page .dir-header .info .avg strong { color: #fbbf24; }
        .director-page .movie-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 14px;
        }

        .hint-text {
            position: absolute;
            bottom: 118px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: rgba(255, 255, 255, 0.12);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.8px;
            text-align: center;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 2px 24px rgba(0, 0, 0, 0.6);
            font-family: 'Inter', system-ui, sans-serif;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: #6b7a8f;
            font-size: 18px;
            gap: 14px;
        }
        .loading-spinner::before {
            content: '';
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.04);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 820px) {
            #search-overlay {
                width: 92%;
                bottom: 24px;
                padding: 4px 6px 4px 18px;
                border-radius: 44px;
            }
            #search-overlay input { font-size: 13px; padding: 10px 0; }
            .search-btn { padding: 8px 16px; font-size: 12px; }
            .search-btn span { display: none; }
            #page-overlay { padding: 20px 16px 40px; }
            .movie-page .poster-section .poster { width: 140px; height: 196px; font-size: 44px; }
            .movie-page .poster-section .info .title { font-size: 28px; }
            .movie-page .poster-section .info .title .year { font-size: 20px; }
            .genre-header { font-size: 32px; }
            .movie-grid { grid-template-columns: 1fr 1fr; }
            .perspective-block { padding: 18px 20px; }
            .aesthetic-grid { grid-template-columns: 1fr 1fr; }
            .financial-grid { grid-template-columns: 1fr 1fr; }
            .director-page .dir-header .info .name { font-size: 28px; }
            .director-page .movie-list { grid-template-columns: 1fr 1fr; }
            .hint-text { bottom: 86px; font-size: 11px; }
            .rating-bars .rb-item .rb-bar { width: 90px; }
        }
        @media (max-width: 500px) {
            #search-overlay {
                width: 96%;
                bottom: 16px;
                padding: 4px 4px 4px 14px;
                border-radius: 34px;
            }
            #search-overlay input { font-size: 12px; padding: 8px 0; }
            .search-btn { padding: 6px 12px; font-size: 11px; }
            #page-overlay { padding: 14px 10px 30px; }
            .movie-page .poster-section .poster { width: 100px; height: 140px; font-size: 32px; }
            .movie-page .poster-section .info .title { font-size: 20px; }
            .movie-page .poster-section .info .title .year { font-size: 16px; }
            .genre-header { font-size: 22px; }
            .movie-grid { grid-template-columns: 1fr; }
            .perspective-block .p-title { font-size: 17px; }
            .aesthetic-grid { grid-template-columns: 1fr 1fr; gap: 10px 16px; }
            .financial-grid { grid-template-columns: 1fr; }
            .director-page .dir-header .info .name { font-size: 22px; }
            .director-page .movie-list { grid-template-columns: 1fr; }
            .hint-text { bottom: 70px; font-size: 10px; }
            .rating-bars .rb-item .rb-bar { width: 70px; }
            .close-btn { width: 36px; height: 36px; font-size: 16px; }
            .movie-card { padding: 12px 16px; }
            .movie-card .m-title { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div id="root">

        <!-- TOP BAR -->
        <div id="top-bar">
            <div class="line"></div>
            <div class="title">CineBASE</div>
            <div class="line"></div>
        </div>

        <!-- THREE.JS CANVAS -->
        <div id="three-container"></div>

        <!-- HINT -->
        <div class="hint-text">✦ click any bubble – main genre or subgenre – to see top‑rated films</div>

        <!-- SEARCH BAR -->
        <div id="search-overlay">
            <input type="text" id="search-input" placeholder="Search movies by title…" autocomplete="off" />
            <div class="divider"></div>
            <button class="search-btn" id="search-btn">⌘ <span>Search</span></button>
            <div id="search-results"></div>
        </div>

        <!-- PAGE OVERLAY -->
        <div id="page-overlay">
            <button class="close-btn" id="close-overlay">✕</button>
            <div id="page-content"></div>
        </div>

    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════
        //  TMDB CONFIG
        // ═══════════════════════════════════════════════════════════════════
        const TMDB_KEY = 'fb7bb23f03b6994dafc674c074d01761';
        const TMDB_BASE = 'https://api.themoviedb.org/3';
        const TMDB_IMG = 'https://image.tmdb.org/t/p/w500';
        const TMDB_IMG_ORIG = 'https://image.tmdb.org/t/p/original';

        async function tmdbFetch(endpoint, params = '') {
            const url = `${TMDB_BASE}${endpoint}?api_key=${TMDB_KEY}${params}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`TMDB error ${resp.status}`);
            return resp.json();
        }

        async function getMovieDetails(id) {
            return tmdbFetch(`/movie/${id}`, '&append_to_response=credits,keywords,reviews,videos,similar');
        }

        async function getPersonDetails(id) {
            return tmdbFetch(`/person/${id}`, '&append_to_response=movie_credits');
        }

        function formatCurrency(val) {
            if (!val) return '—';
            if (val >= 1e9) return '$' + (val / 1e9).toFixed(1) + 'B';
            if (val >= 1e6) return '$' + (val / 1e6).toFixed(1) + 'M';
            return '$' + val.toLocaleString();
        }

        function getYear(dateStr) {
            if (!dateStr) return null;
            return parseInt(dateStr.split('-')[0]) || null;
        }

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        // ── genre maps ──
        let genreMap = {};
        let genreNameToId = {};
        let genresLoaded = false;

        // ── display name to actual TMDB genre name mapping ──
        // This covers main genres and all subgenres, mapped to official TMDB genre names.
        const DISPLAY_TO_GENRE = {
            // Main genres
            'Action': 'Action',
            'Drama': 'Drama',
            'Comedy': 'Comedy',
            'Sci-Fi': 'Science Fiction',
            'Horror': 'Horror',
            'Romance': 'Romance',
            'Thriller': 'Thriller',
            'Animation': 'Animation',
            'Fantasy': 'Fantasy',
            'Crime': 'Crime',

            // Subgenres (mapped to parent genres)
            'Adventure': 'Adventure',
            'Martial Arts': 'Action',
            'Superhero': 'Action',
            'Spy': 'Action',
            'War': 'War',
            'Disaster': 'Action',
            'Heist': 'Crime',

            'Historical': 'History',
            'Psychological': 'Thriller',
            'Family': 'Family',
            'Legal': 'Drama',
            'Political': 'Thriller',
            'Melodrama': 'Drama',

            'Romantic': 'Romance',
            'Black': 'Comedy',
            'Satire': 'Comedy',
            'Slapstick': 'Comedy',
            'Mockumentary': 'Comedy',
            'Screwball': 'Comedy',
            'Dark': 'Comedy',

            'Cyberpunk': 'Science Fiction',
            'Space Opera': 'Science Fiction',
            'Time Travel': 'Science Fiction',
            'Dystopian': 'Science Fiction',
            'Alien': 'Science Fiction',
            'Steampunk': 'Science Fiction',

            'Slasher': 'Horror',
            'Supernatural': 'Horror',
            'Body': 'Horror',
            'Found Footage': 'Horror',
            'Gothic': 'Horror',

            'Romantic Drama': 'Romance',
            'Romantic Comedy': 'Romance',
            'Period': 'Romance',
            'Musical': 'Music',
            'Teen': 'Romance',
            'Epic': 'Adventure',

            'Mystery': 'Mystery',
            'Neo-Noir': 'Crime',
            'Erotic': 'Romance',

            '2D': 'Animation',
            '3D': 'Animation',
            'Stop Motion': 'Animation',
            'Anime': 'Animation',
            'CGI': 'Animation',
            'Claymation': 'Animation',
            'Traditional': 'Animation',

            'High': 'Fantasy',
            'Low': 'Fantasy',
            'Urban': 'Fantasy',
            'Sword & Sorcery': 'Fantasy',
            'Fairy Tale': 'Fantasy',
            'Mythological': 'Fantasy',

            'Mob': 'Crime',
            'Noir': 'Crime',
            'Detective': 'Crime',
            'Gangster': 'Crime',
            'Police': 'Crime',
            'Caper': 'Crime',
            'Prison': 'Drama'
        };

        async function loadGenres() {
            try {
                const data = await tmdbFetch('/genre/movie/list');
                data.genres.forEach(g => {
                    genreMap[g.id] = g.name;
                    genreNameToId[g.name] = g.id;
                    genreNameToId[g.name.toLowerCase()] = g.id;
                });
                genresLoaded = true;
                console.log('✅ Genres loaded:', Object.keys(genreNameToId).length);
            } catch (e) { console.warn('Genre load failed', e); }
        }

        let genresPromise = loadGenres();

        function genreNames(ids) {
            if (!ids || !ids.length) return ['Unknown'];
            return ids.map(id => genreMap[id] || 'Unknown').filter(Boolean);
        }

        // ── GENRE RANKING – always uses official TMDB genre ID ──
        async function openGenreRanking(name, fallbackName = null) {
            if (!genresLoaded) await genresPromise;

            const overlay = document.getElementById('page-overlay');
            const content = document.getElementById('page-content');
            content.innerHTML = `<div class="loading-spinner">Loading top "${name}" films…</div>`;
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';

            try {
                // Determine the official genre name
                let officialGenre = DISPLAY_TO_GENRE[name] || name;
                // If no direct mapping, try fallback
                if (!genreNameToId[officialGenre] && fallbackName) {
                    officialGenre = DISPLAY_TO_GENRE[fallbackName] || fallbackName;
                }

                const genreId = genreNameToId[officialGenre];
                if (!genreId) {
                    content.innerHTML =
                        `<div style="padding:40px;text-align:center;color:#6b7a8f;">No official genre mapping for “${name}”.</div>`;
                    return;
                }

                const data = await tmdbFetch('/discover/movie',
                    `&with_genres=${genreId}&sort_by=vote_average.desc&vote_count.gte=50&page=1`
                );
                const movies = data.results || [];
                if (!movies.length) {
                    content.innerHTML =
                        `<div style="padding:40px;text-align:center;color:#6b7a8f;">No movies found for “${name}”.</div>`;
                    return;
                }
                renderGenreRanking(name, movies);
            } catch (e) {
                content.innerHTML =
                    `<div style="color:#f87171;padding:40px;text-align:center;">Failed to load: ${e.message}</div>`;
            }
        }

        function renderGenreRanking(genreName, movies) {
            const content = document.getElementById('page-content');
            const label = genreName.charAt(0).toUpperCase() + genreName.slice(1);

            let html = `
                <div style="margin-bottom:12px;">
                    <div class="genre-header"><span>🎬 ${label}</span> <span style="font-size:20px;color:#6b7a8f;font-weight:400;">Top Ranked</span></div>
                    <div class="genre-sub">Movies ranked by TMDB vote average (min 50 votes)</div>
                </div>
                <div class="movie-grid">
            `;

            movies.forEach(m => {
                const year = getYear(m.release_date);
                const rating = m.vote_average || 0;
                const poster = m.poster_path ? TMDB_IMG + m.poster_path : null;
                const stars = '★'.repeat(Math.round(rating / 2)) + '☆'.repeat(5 - Math.round(rating / 2));
                html += `
                    <div class="movie-card" onclick="openMovie(${m.id})">
                        <div style="display:flex;gap:14px;align-items:center;">
                            <div style="width:44px;height:60px;border-radius:6px;background:#141820;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,0.04);">
                                ${poster ? `<img src="${poster}" style="width:100%;height:100%;object-fit:cover;" />` : '🎬'}
                            </div>
                            <div style="flex:1;min-width:0;">
                                <div class="m-title">${m.title} <span class="m-year">${year ? `(${year})` : ''}</span></div>
                                <div class="m-rating">
                                    <span class="stars">${stars}</span>
                                    <span style="color:#fbbf24;">${rating.toFixed(1)}</span>
                                    <span class="views">👁️ ${(m.vote_count||0).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            content.innerHTML = html;
        }

        // ═══════════════════════════════════════════════════════════════════
        //  3D SCENE – GENRE BUBBLES
        // ═══════════════════════════════════════════════════════════════════
        const GENRES = {
            'Action': ['Adventure', 'Martial Arts', 'Superhero', 'Spy', 'War', 'Disaster', 'Heist'],
            'Drama': ['Historical', 'Crime', 'Psychological', 'Family', 'Legal', 'Political', 'Melodrama'],
            'Comedy': ['Romantic', 'Black', 'Satire', 'Slapstick', 'Mockumentary', 'Screwball', 'Dark'],
            'Sci-Fi': ['Cyberpunk', 'Space Opera', 'Time Travel', 'Dystopian', 'Alien', 'Steampunk'],
            'Horror': ['Slasher', 'Supernatural', 'Psychological', 'Body', 'Found Footage', 'Gothic'],
            'Romance': ['Romantic Drama', 'Romantic Comedy', 'Period', 'Musical', 'Teen', 'Epic'],
            'Thriller': ['Psychological', 'Crime', 'Mystery', 'Political', 'Neo-Noir', 'Erotic', 'Action'],
            'Animation': ['2D', '3D', 'Stop Motion', 'Anime', 'CGI', 'Claymation', 'Traditional'],
            'Fantasy': ['High', 'Low', 'Urban', 'Dark', 'Sword & Sorcery', 'Fairy Tale', 'Mythological'],
            'Crime': ['Mob', 'Noir', 'Detective', 'Gangster', 'Police', 'Caper', 'Prison']
        };

        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x07080b);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.maxDistance = 32;
        controls.minDistance = 4;
        controls.target.set(0, 0, 0);
        controls.update();

        // ── lights ──
        const ambient = new THREE.AmbientLight(0x404070, 0.5);
        scene.add(ambient);
        const key = new THREE.DirectionalLight(0xffeedd, 1.4);
        key.position.set(6, 12, 8);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0x6688ff, 0.4);
        fill.position.set(-6, 2, 6);
        scene.add(fill);
        const rim = new THREE.DirectionalLight(0x8888ff, 0.3);
        rim.position.set(0, -4, -10);
        scene.add(rim);
        const point = new THREE.PointLight(0x6366f1, 0.5, 20);
        point.position.set(0, 4, 0);
        scene.add(point);

        // ── stars ──
        const starGeo = new THREE.BufferGeometry();
        const starCount = 3000;
        const pos = new Float32Array(starCount * 3);
        const sizes = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 60 + Math.random() * 80;
            pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            pos[i*3+1] = r * Math.cos(phi) * 0.4;
            pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
            sizes[i] = 0.08 + Math.random() * 0.2;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        const starMat = new THREE.PointsMaterial({
            color: 0x8899cc,
            size: 0.15,
            transparent: true,
            opacity: 0.7,
            sizeAttenuation: true
        });
        scene.add(new THREE.Points(starGeo, starMat));

        // ── build bubbles ──
        const mainList = Object.keys(GENRES);
        const allBubbles = [];
        const mainBubbles = [];
        const subBubbles = [];
        const RADIUS = 4.2;

        mainList.forEach((main, i) => {
            const angle = (i / mainList.length) * Math.PI * 2;
            const x = Math.cos(angle) * RADIUS;
            const z = Math.sin(angle) * RADIUS;
            const y = (Math.random() - 0.5) * 1.6;

            const hue = i / mainList.length;
            const color = new THREE.Color().setHSL(hue, 0.75, 0.55);
            const geo = new THREE.SphereGeometry(0.95, 40, 40);
            const mat = new THREE.MeshPhysicalMaterial({
                color,
                emissive: color,
                emissiveIntensity: 0.15,
                transparent: true,
                opacity: 0.92,
                roughness: 0.15,
                metalness: 0.1,
                clearcoat: 0.3,
                clearcoatRoughness: 0.4,
            });
            const sphere = new THREE.Mesh(geo, mat);
            sphere.position.set(x, y, z);
            sphere.userData = {
                genre: main,
                isMain: true,
                initialPos: new THREE.Vector3(x, y, z),
                offset: Math.random() * Math.PI * 2,
                speed: 0.25 + Math.random() * 0.2,
                hue
            };
            scene.add(sphere);
            mainBubbles.push(sphere);
            allBubbles.push(sphere);

            // glow ring
            const ringGeo = new THREE.RingGeometry(0.9, 1.2, 48);
            const ringMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.08,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.copy(sphere.position);
            ring.lookAt(0, 0, 0);
            ring.userData.parent = sphere;
            scene.add(ring);

            // subgenres
            const subs = GENRES[main] || [];
            const subRadius = 1.9 + Math.random() * 0.4;
            subs.forEach((sub, j) => {
                const subAngle = (j / subs.length) * Math.PI * 2 + Math.random() * 0.15;
                const sx = x + Math.cos(subAngle) * subRadius;
                const sz = z + Math.sin(subAngle) * subRadius;
                const sy = y + (Math.random() - 0.5) * 0.7;

                const subColor = new THREE.Color().setHSL((hue + 0.25 + j / subs.length * 0.25) % 1, 0.55, 0.45);
                const subGeo = new THREE.SphereGeometry(0.32, 20, 20);
                const subMat = new THREE.MeshPhysicalMaterial({
                    color: subColor,
                    emissive: subColor,
                    emissiveIntensity: 0.08,
                    transparent: true,
                    opacity: 0.7,
                    roughness: 0.3,
                    metalness: 0.05,
                });
                const subSphere = new THREE.Mesh(subGeo, subMat);
                subSphere.position.set(sx, sy, sz);
                subSphere.userData = {
                    genre: sub,
                    isMain: false,
                    parentGenre: main,
                    initialPos: new THREE.Vector3(sx, sy, sz),
                    offset: Math.random() * Math.PI * 2,
                    speed: 0.4 + Math.random() * 0.3,
                };
                scene.add(subSphere);
                subBubbles.push(subSphere);
                allBubbles.push(subSphere);
            });
        });

        // ── click handler ──
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        renderer.domElement.addEventListener('click', function(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(allBubbles);
            if (hits.length > 0) {
                const data = hits[0].object.userData;
                const name = data.genre;
                const parent = data.parentGenre || null;
                if (name) {
                    openGenreRanking(name, parent);
                }
            }
        });

        // ── animation ──
        function animateBubbles() {
            requestAnimationFrame(animateBubbles);
            const time = Date.now() * 0.001;
            mainBubbles.forEach(m => {
                const d = m.userData;
                if (d && d.initialPos) {
                    const f = Math.sin(time * d.speed + d.offset) * 0.07;
                    m.position.x = d.initialPos.x + f * 0.5;
                    m.position.y = d.initialPos.y + Math.sin(time * d.speed * 0.7 + d.offset * 2) * 0.07;
                    m.position.z = d.initialPos.z + Math.cos(time * d.speed * 0.9 + d.offset * 1.3) * 0.07;
                    m.rotation.x += 0.002;
                    m.rotation.y += 0.003;
                }
            });
            subBubbles.forEach(m => {
                const d = m.userData;
                if (d && d.initialPos) {
                    const f = Math.sin(time * d.speed + d.offset) * 0.05;
                    m.position.x = d.initialPos.x + f * 0.5;
                    m.position.y = d.initialPos.y + Math.sin(time * d.speed * 0.8 + d.offset * 1.7) * 0.05;
                    m.position.z = d.initialPos.z + Math.cos(time * d.speed * 1.1 + d.offset * 0.9) * 0.05;
                    m.rotation.x += 0.003;
                    m.rotation.y += 0.004;
                }
            });
            controls.update();
            renderer.render(scene, camera);
        }
        animateBubbles();

        window.addEventListener('resize', () => {
            const w = container.clientWidth, h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ═══════════════════════════════════════════════════════════════════
        //  SEARCH – MOVIES ONLY (title contains query, case-insensitive)
        // ═══════════════════════════════════════════════════════════════════
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const resultsContainer = document.getElementById('search-results');

        async function performSearch(query) {
            if (!query || query.trim().length === 0) {
                resultsContainer.classList.remove('open');
                return;
            }

            const trimmed = query.trim();

            // Ensure genres are loaded for genre detection (but we don't need it for movie search)
            if (!genresLoaded) await genresPromise;

            // If the query matches a known genre or subgenre name, open the ranking overlay.
            // This allows the user to type "Sci-Fi" and see the ranking.
            const lower = trimmed.toLowerCase();
            // Check if we have a mapping for this term (including subgenres)
            const mappedGenre = DISPLAY_TO_GENRE[trimmed] || DISPLAY_TO_GENRE[lower] || null;
            if (mappedGenre && genreNameToId[mappedGenre]) {
                openGenreRanking(trimmed);
                resultsContainer.classList.remove('open');
                return;
            }
            // Also check main genre names directly
            if (genreNameToId[lower] || genreNameToId[trimmed]) {
                openGenreRanking(trimmed);
                resultsContainer.classList.remove('open');
                return;
            }

            // Movie search – find movies whose title contains the query (case-insensitive)
            try {
                const data = await tmdbFetch('/search/movie', `&query=${encodeURIComponent(trimmed)}`);
                const results = data.results || [];
                const lowerQuery = trimmed.toLowerCase();
                // Filter to titles that contain the query (anywhere)
                const matched = results.filter(m =>
                    m.title && m.title.toLowerCase().includes(lowerQuery)
                ).slice(0, 8);

                if (!matched.length) {
                    resultsContainer.innerHTML =
                        `<div class="result-empty">No movies found containing “${trimmed}”</div>`;
                    resultsContainer.classList.add('open');
                    return;
                }

                let html = '';
                for (const item of matched) {
                    const title = item.title || 'Untitled';
                    const year = item.release_date ? getYear(item.release_date) : null;
                    const poster = item.poster_path ? TMDB_IMG + item.poster_path : null;
                    const genreLabel = (item.genre_ids && item.genre_ids.length) ?
                        genreNames(item.genre_ids.slice(0, 2)).join(', ') : 'Movie';

                    html += `
                        <div class="result-item" data-id="${item.id}" data-type="movie">
                            <div class="poster-sm">${poster ? `<img src="${poster}" />` : '🎬'}</div>
                            <div class="info">
                                <div class="title">${title} ${year ? `<span style="color:#5a6a7f;font-weight:400;">(${year})</span>` : ''}</div>
                                <div class="sub">${genreLabel}</div>
                            </div>
                            <span class="badge-genre">🎬 Movie</span>
                        </div>
                    `;
                }

                resultsContainer.innerHTML = html;
                resultsContainer.classList.add('open');

                resultsContainer.querySelectorAll('.result-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const id = this.dataset.id;
                        openMovie(id);
                        resultsContainer.classList.remove('open');
                        searchInput.value = '';
                    });
                });

            } catch (err) {
                resultsContainer.innerHTML =
                    `<div class="result-empty" style="color:#f87171;">Error: ${err.message}</div>`;
                resultsContainer.classList.add('open');
            }
        }

        // ── Movie detail and person functions (unchanged) ──
        async function openMovie(id) {
            const overlay = document.getElementById('page-overlay');
            const content = document.getElementById('page-content');
            content.innerHTML = `<div class="loading-spinner">Loading movie…</div>`;
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
            try {
                const data = await getMovieDetails(id);
                renderMovie(data);
            } catch (err) {
                content.innerHTML =
                    `<div style="color:#f87171;padding:40px;text-align:center;">Failed to load movie: ${err.message}</div>`;
            }
        }

        function renderMovie(data) {
            const content = document.getElementById('page-content');
            const title = data.title || 'Untitled';
            const year = getYear(data.release_date);
            const poster = data.poster_path ? TMDB_IMG + data.poster_path : null;
            const backdrop = data.backdrop_path ? TMDB_IMG_ORIG + data.backdrop_path : null;
            const genres = data.genres ? data.genres.map(g => g.name) : ['Unknown'];
            const director = data.credits?.crew?.find(c => c.job === 'Director')?.name || 'Unknown';
            const directorId = data.credits?.crew?.find(c => c.job === 'Director')?.id || null;
            const cast = data.credits?.cast?.slice(0, 6).map(c => c.name) || [];
            const overview = data.overview || 'No overview available.';
            const runtime = data.runtime;
            const voteAvg = data.vote_average || 0;
            const voteCount = data.vote_count || 0;
            const budget = data.budget || 0;
            const revenue = data.revenue || 0;
            const status = data.status || 'Unknown';
            const tagline = data.tagline || '';
            const keywords = data.keywords?.keywords?.slice(0, 8).map(k => k.name) || [];
            const awards = data.reviews?.results?.slice(0, 2).map(r => r.author + ': ' + r.content.slice(0, 80) + '…') || [];
            const similar = data.similar?.results?.slice(0, 6) || [];
            const videos = data.videos?.results?.filter(v => v.site === 'YouTube').slice(0, 2) || [];

            const stars = '★'.repeat(Math.round(voteAvg / 2)) + '☆'.repeat(5 - Math.round(voteAvg / 2));

            const aestheticKeys = ['cinematography', 'miseEnScene', 'lighting', 'colour', 'editing', 'soundDesign', 'music',
                'acting', 'vfx', 'productionDesign'
            ];
            let aestHtml = '';
            const baseScore = clamp(voteAvg / 10 * 1.2, 0.2, 0.95);
            aestheticKeys.forEach((k) => {
                const val = clamp(baseScore + (Math.random() - 0.5) * 0.25, 0.1, 0.98);
                aestHtml += `
                    <div class="ae-item">
                        <span class="ae-label">${k.replace(/([A-Z])/g,' $1').trim()}</span>
                        <div class="ae-bar"><div class="fill" style="width:${val*100}%;"></div></div>
                        <span class="ae-val">${(val*10).toFixed(1)}</span>
                    </div>
                `;
            });

            const wordcloudWords = keywords.length ? keywords : ['cinematic', 'drama', 'visual', 'story', 'character', 'style'];

            const html = `
                <div class="movie-page">
                    ${backdrop ? `<div style="margin-bottom:24px;border-radius:16px;overflow:hidden;max-height:220px;background:#0a0c12;"><img src="${backdrop}" style="width:100%;height:220px;object-fit:cover;opacity:0.6;" /></div>` : ''}
                    <div class="poster-section">
                        <div class="poster">${poster ? `<img src="${poster}" />` : '🎬'}</div>
                        <div class="info">
                            <div class="title">${title} <span class="year">${year ? `(${year})` : ''}</span></div>
                            ${tagline ? `<div style="font-size:15px;color:#8a9aaf;font-style:italic;margin-top:2px;">“${tagline}”</div>` : ''}
                            <div class="director">Directed by ${directorId ? `<strong onclick="openPerson(${directorId})">${director}</strong>` : `<strong>${director}</strong>`}</div>
                            <div class="tags">${genres.map(g => `<span class="tag genre-tag">${g}</span>`).join('')}</div>
                            ${cast.length ? `<div class="actors"><strong>Cast:</strong> ${cast.join(', ')}</div>` : ''}
                            ${runtime ? `<div class="actors"><strong>Runtime:</strong> ${runtime} min</div>` : ''}
                            <div class="actors"><strong>Status:</strong> ${status}</div>
                            ${awards.length ? `<div class="awards">${awards.map(a => `<span class="badge">🏆 ${a}</span>`).join('')}</div>` : ''}
                            <a href="https://www.themoviedb.org/movie/${data.id}" target="_blank" class="wiki-link">🔗 TMDB Page</a>
                        </div>
                    </div>

                    <div style="margin-bottom:20px;background:rgba(255,255,255,0.02);border-radius:16px;padding:20px 24px;border:1px solid rgba(255,255,255,0.04);">
                        <p style="color:#c8d0dc;line-height:1.7;font-size:15px;">${overview}</p>
                    </div>

                    <div class="perspectives">
                        <div class="perspective-block">
                            <div class="p-title"><span class="emoji">👥</span> Audience</div>
                            <div class="rating-bars">
                                <div class="rb-item">
                                    <span class="rb-label">TMDB Rating</span>
                                    <div class="rb-bar"><div class="fill" style="width:${voteAvg*10}%;"></div></div>
                                    <span class="rb-val">${voteAvg.toFixed(1)} / 10</span>
                                </div>
                                <div class="rb-item">
                                    <span class="rb-label">Popularity</span>
                                    <div class="rb-bar"><div class="fill" style="width:${clamp(data.popularity/20,0,100)}%;"></div></div>
                                    <span class="rb-val">${Math.round(data.popularity)}</span>
                                </div>
                                <div class="rb-item">
                                    <span class="rb-label">Votes</span>
                                    <div class="rb-bar"><div class="fill" style="width:${clamp(voteCount/5000*100,0,100)}%;"></div></div>
                                    <span class="rb-val">${voteCount.toLocaleString()}</span>
                                </div>
                            </div>
                            <div style="margin-top:14px;font-size:14px;color:#8a9aaf;">
                                ⭐ ${stars}  •  ${voteCount.toLocaleString()} votes
                            </div>
                            <div class="wordcloud">${wordcloudWords.map(w => `<span class="word ${wordcloudWords.indexOf(w)<2?'large':wordcloudWords.indexOf(w)<5?'med':''}">#${w}</span>`).join('')}</div>
                        </div>

                        <div class="perspective-block">
                            <div class="p-title"><span class="emoji">🎨</span> Aesthetic Analysis</div>
                            <div class="aesthetic-grid">${aestHtml}</div>
                        </div>

                        <div class="perspective-block">
                            <div class="p-title"><span class="emoji">💰</span> Financial</div>
                            <div class="financial-grid">
                                <div class="fi-item"><div class="fi-label">Budget</div><div class="fi-val">${formatCurrency(budget)}</div></div>
                                <div class="fi-item"><div class="fi-label">Revenue</div><div class="fi-val">${formatCurrency(revenue)}</div></div>
                                <div class="fi-item"><div class="fi-label">Profit</div><div class="fi-val" style="color:${revenue-budget>0?'#4ade80':'#f87171'};">${formatCurrency(revenue-budget)}</div></div>
                            </div>
                        </div>

                        ${similar.length ? `
                        <div class="perspective-block">
                            <div class="p-title"><span class="emoji">🎯</span> Similar Movies</div>
                            <div class="movie-grid" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr));">
                                ${similar.map(m => `
                                    <div class="movie-card" onclick="openMovie(${m.id})" style="padding:12px 14px;">
                                        <div style="display:flex;align-items:center;gap:12px;">
                                            <div style="width:36px;height:48px;border-radius:4px;background:#141820;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;">${m.poster_path ? `<img src="${TMDB_IMG+m.poster_path}" style="width:100%;height:100%;object-fit:cover;" />` : '🎬'}</div>
                                            <div>
                                                <div class="m-title" style="font-size:14px;">${m.title}</div>
                                                <div class="m-meta" style="font-size:11px;">${m.release_date ? getYear(m.release_date) : ''}  ⭐ ${(m.vote_average||0).toFixed(1)}</div>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}

                        ${videos.length ? `
                        <div class="perspective-block">
                            <div class="p-title"><span class="emoji">🎥</span> Trailers</div>
                            <div style="display:flex;gap:16px;flex-wrap:wrap;">
                                ${videos.map(v => `
                                    <div style="flex:1;min-width:200px;max-width:380px;border-radius:12px;overflow:hidden;background:#0a0c12;border:1px solid rgba(255,255,255,0.04);">
                                        <div style="position:relative;padding-bottom:56.25%;height:0;">
                                            <iframe src="https://www.youtube.com/embed/${v.key}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;

            content.innerHTML = html;
        }

        async function openPerson(id) {
            const overlay = document.getElementById('page-overlay');
            const content = document.getElementById('page-content');
            content.innerHTML = `<div class="loading-spinner">Loading person…</div>`;
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
            try {
                const data = await getPersonDetails(id);
                renderPerson(data);
            } catch (err) {
                content.innerHTML =
                    `<div style="color:#f87171;padding:40px;text-align:center;">Failed to load person: ${err.message}</div>`;
            }
        }

        function renderPerson(data) {
            const content = document.getElementById('page-content');
            const name = data.name || 'Unknown';
            const profile = data.profile_path ? TMDB_IMG + data.profile_path : null;
            const known = data.known_for_department || 'Actor';
            const birthday = data.birthday || 'N/A';
            const place = data.place_of_birth || 'N/A';
            const bio = data.biography || 'No biography available.';
            const movies = data.movie_credits?.cast?.slice(0, 12) || [];
            const popularity = data.popularity || 0;
            let avgRating = 0;
            const rated = movies.filter(m => m.vote_average > 0);
            if (rated.length) {
                avgRating = rated.reduce((s, m) => s + m.vote_average, 0) / rated.length;
            }
            const html = `
                <div class="director-page">
                    <div class="dir-header">
                        <div class="avatar">${profile ? `<img src="${profile}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />` : name.charAt(0).toUpperCase()}</div>
                        <div class="info">
                            <div class="name">${name}</div>
                            <div class="avg">${known}  •  ⭐ <strong>${avgRating.toFixed(1)}</strong> avg rating  •  👁️ ${Math.round(popularity)}</div>
                            <div style="color:#8a9aaf;font-size:14px;margin-top:2px;">${birthday}  •  ${place}</div>
                        </div>
                    </div>
                    <div style="background:rgba(255,255,255,0.02);border-radius:16px;padding:20px 24px;border:1px solid rgba(255,255,255,0.04);margin-bottom:28px;">
                        <p style="color:#c8d0dc;line-height:1.7;font-size:15px;">${bio}</p>
                    </div>
                    <div class="perspective-block">
                        <div class="p-title"><span class="emoji">🎬</span> Filmography (${movies.length} titles)</div>
                        <div class="movie-list">
                            ${movies.map(m => `
                                <div class="movie-card" onclick="openMovie(${m.id})" style="padding:12px 16px;">
                                    <div style="display:flex;align-items:center;gap:12px;">
                                        <div style="width:34px;height:46px;border-radius:4px;background:#141820;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;">${m.poster_path ? `<img src="${TMDB_IMG+m.poster_path}" style="width:100%;height:100%;object-fit:cover;" />` : '🎬'}</div>
                                        <div>
                                            <div class="m-title" style="font-size:14px;">${m.title}</div>
                                            <div class="m-meta" style="font-size:11px;">${m.release_date ? getYear(m.release_date) : '—'}  ⭐ ${(m.vote_average||0).toFixed(1)}</div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        ${!movies.length ? '<div style="color:#5a6a7f;padding:20px;text-align:center;">No movies found.</div>' : ''}
                    </div>
                </div>
            `;
            content.innerHTML = html;
        }

        // ═══════════════════════════════════════════════════════════════════
        //  UI EVENTS
        // ═══════════════════════════════════════════════════════════════════
        let debounceTimer;

        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            const v = this.value;
            if (v.trim().length === 0) {
                resultsContainer.classList.remove('open');
                return;
            }
            debounceTimer = setTimeout(() => performSearch(v), 280);
        });

        searchBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const v = searchInput.value;
            if (v.trim().length > 0) performSearch(v);
        });

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const v = this.value;
                if (v.trim().length > 0) performSearch(v);
            }
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('#search-overlay')) {
                resultsContainer.classList.remove('open');
            }
        });

        document.getElementById('close-overlay').addEventListener('click', function() {
            document.getElementById('page-overlay').classList.remove('open');
            document.body.style.overflow = '';
        });

        document.getElementById('page-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('open');
                document.body.style.overflow = '';
            }
        });

        window.openMovie = openMovie;
        window.openPerson = openPerson;
        window.openGenreRanking = openGenreRanking;
        window.performSearch = performSearch;

        console.log('🚀 CineBASE – Final: search finds movies by title (contains), genres/subgenres mapped to official TMDB genres.');
    </script>
</body>
</html>
